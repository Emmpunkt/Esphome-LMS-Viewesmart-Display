external_components:
  - source: github://sEbola76/Makerfabs
    components: [cst826]
    refresh: 1h
  - source:
      type: local
      path: components
    components: [mipi_rgb]

esphome:
  name: touch-knob
  friendly_name: "Rundes LMS Display"
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            ESP_LOGI("app", "Firmware v5 gestartet. WDT: 30s, PNG-Fallback aktiv.");
        - delay: 1000ms
        - lambda: |-
            id(rundes_display).update();
        - lambda: |-
            lv_obj_set_style_anim_time(id(label_title),  5000, 0);
            lv_obj_set_style_anim_time(id(label_artist), 5000, 0);

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LCD_RGB_BOUNCE_BUFFER_SIZE: "28800"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_FREERTOS_USE_TICKLESS_IDLE: "n"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "32768"
      CONFIG_LWIP_TCPIP_TASK_STACK_SIZE: "8192"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:
  boot_is_good_after: 15s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  clk_pin:
    number: GPIO13
    allow_other_uses: true
  mosi_pin:
    number: GPIO12
    allow_other_uses: true

substitutions:
  glyphs_de: |-
    !'"%()+=,-_.:/\?&`´{[]}°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyzÄÖÜäöüßåÅÆæØøÃ¥é#ãíýóáŠÁÉàì

font:
  - file: "fonts/NotoSans-Regular.ttf"
    id: font1
    size: 24
    glyphs: ${glyphs_de}

  - file: "fonts/NotoSans-Regular.ttf"
    id: font2
    size: 34
    glyphs: ${glyphs_de}

http_request:
  timeout: 15s

online_image:
  - id: cover_image
    url: "http://homeassistant.local:9000/music/current/cover_480x480_m.jpg?player=XX:XX:XX:XX:XX:XX"
    format: JPEG
    type: RGB565
    buffer_size: 4096
    update_interval: never
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGI("cover", "v5: JPEG geladen. Heap: %u int, %u PSRAM",
                     heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
            id(cover_retry_count) = 0;
            lv_image_set_src(id(img_cover), id(cover_image).get_lv_image_dsc());
            lv_obj_set_style_opa(id(img_cover), LV_OPA_COVER, LV_PART_MAIN);
    on_error:
      then:
        - lambda: |-
            ESP_LOGW("cover", "v5: JPEG fehlgeschlagen, versuche PNG. Heap: %u int, %u PSRAM",
                     heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
        - script.execute: download_cover_png

  - id: cover_image_png
    url: "http://homeassistant.local:9000/music/current/cover_480x480_m.jpg?player=XX:XX:XX:XX:XX:XX"
    format: PNG
    type: RGB565
    buffer_size: 4096
    update_interval: never
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGI("cover", "v5: PNG geladen. Heap: %u int, %u PSRAM",
                     heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
            id(cover_retry_count) = 0;
            lv_image_set_src(id(img_cover), id(cover_image_png).get_lv_image_dsc());
            lv_obj_set_style_opa(id(img_cover), LV_OPA_COVER, LV_PART_MAIN);
    on_error:
      then:
        - lambda: |-
            ESP_LOGW("cover", "v5: Auch PNG fehlgeschlagen. Heap: %u int, %u PSRAM",
                     heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
        - lambda: lv_obj_set_style_opa(id(img_cover), LV_OPA_0, LV_PART_MAIN);
        - if:
            condition:
              lambda: 'return id(cover_retry_count) < 3;'
            then:
              - lambda: id(cover_retry_count) += 1;
              - delay: 10000ms
              - script.execute: download_cover

globals:
  - id: touch_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_start_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: current_preset
    type: int
    restore_value: yes
    initial_value: '0'
  - id: is_muted
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: cover_retry_count
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: download_cover
    mode: single
    then:
      - lambda: lv_obj_set_style_opa(id(img_cover), LV_OPA_0, LV_PART_MAIN);
      - delay: 1500ms
      - lambda: |-
          ESP_LOGI("cover", "v5: Starte JPEG-Download. Heap: %u int, %u PSRAM",
                   heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                   heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
      - lambda: id(cover_image).update();

  - id: download_cover_png
    mode: single
    then:
      - delay: 500ms
      - lambda: |-
          ESP_LOGI("cover", "v5: Starte PNG-Download. Heap: %u int, %u PSRAM",
                   heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                   heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
      - lambda: id(cover_image_png).update();

  - id: activate_preset
    then:
      - if:
          condition:
            lambda: 'return id(current_preset) == 0;'
          then:
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: button.none_voreinstellung_1
      - if:
          condition:
            lambda: 'return id(current_preset) == 1;'
          then:
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: button.none_voreinstellung_2
      - if:
          condition:
            lambda: 'return id(current_preset) == 2;'
          then:
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: button.none_voreinstellung_3
      - if:
          condition:
            lambda: 'return id(current_preset) == 3;'
          then:
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: button.none_voreinstellung_4
      - if:
          condition:
            lambda: 'return id(current_preset) == 4;'
          then:
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: button.none_voreinstellung_5
      - if:
          condition:
            lambda: 'return id(current_preset) == 5;'
          then:
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: button.none_voreinstellung_6

display:
  - platform: mipi_rgb
    id: rundes_display
    model: UEDX48480021-MD80ET
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - rundes_display
  bg_color: black
  buffer_size: 100%
  byte_order: little_endian

  widgets:
    - image:
        id: img_cover
        src: cover_image
        align: LV_ALIGN_CENTER
        width: 480
        height: 480
        opa: 0%

    - arc:
        id: volume_arc
        align: LV_ALIGN_CENTER
        width: 460
        height: 460
        min_value: 0
        max_value: 100
        value: 50
        start_angle: 135
        end_angle: 45
        bg_opa: 0%
        arc_color: 0x1a1a1a
        arc_width: 14
        arc_opa: 25%
        adjustable: false
        indicator:
          arc_color: 0x606060
          arc_width: 14
          arc_opa: 85%
        knob:
          bg_opa: 0%
          border_opa: 0%
          width: 1
          height: 1

    - obj:
        id: text_overlay
        align: LV_ALIGN_CENTER
        y: -20
        width: 400
        height: SIZE_CONTENT
        bg_color: black
        bg_opa: 59%
        border_width: 0
        radius: 15
        pad_top: 10
        pad_bottom: 10
        pad_left: 12
        pad_right: 12
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: CENTER
          flex_align_cross: CENTER
          pad_row: 4
        widgets:
          - label:
              id: label_artist
              text: "Artist"
              text_font: font2
              text_color: white
              long_mode: SCROLL_CIRCULAR
              width: 370
              text_align: CENTER
          - label:
              id: label_title
              text: "Title"
              text_font: font2
              text_color: white
              long_mode: SCROLL_CIRCULAR
              width: 370
              text_align: CENTER

    - obj:
        id: swipe_detector
        align: LV_ALIGN_CENTER
        width: 480
        height: 480
        bg_opa: 0%
        border_width: 0
        pad_all: 0
        clickable: true
        on_press:
          - lambda: |-
              lv_point_t p;
              lv_indev_get_point(lv_indev_get_act(), &p);
              id(touch_start_x) = p.x;
              id(touch_start_y) = p.y;
        on_release:
          - lambda: |-
              lv_point_t p;
              lv_indev_get_point(lv_indev_get_act(), &p);
              int dx = p.x - id(touch_start_x);
              int dy = p.y - id(touch_start_y);
              ESP_LOGI("swipe", "dx=%d dy=%d", dx, dy);
              if (abs(dx) > 60 && abs(dx) > abs(dy)) {
                if (dx < 0) {
                  id(current_preset) = (id(current_preset) + 1) % 6;
                } else {
                  id(current_preset) = (id(current_preset) + 5) % 6;
                }
                id(activate_preset).execute();
              }

output:
  - platform: ledc
    id: backlight_output
    inverted: True
    pin: 7
    frequency: 5000Hz

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON

i2c:
  sda: GPIO16
  scl: GPIO15

touchscreen:
  platform: cst826
  id: touch
  skip_probe: true
  update_interval: 25ms

sensor:
  - platform: rotary_encoder
    id: volume_encoder
    pin_a: GPIO5
    pin_b: GPIO6
    resolution: 4
    min_value: 0
    max_value: 100
    on_value:
      then:
        - lambda: |-
            lv_arc_set_value(id(volume_arc), (int) x);
        - homeassistant.service:
            service: media_player.volume_set
            data:
              entity_id: media_player.schlafzimmer
              volume_level: !lambda |-
                return (float) x / 100.0f;

  - platform: homeassistant
    entity_id: media_player.schlafzimmer
    attribute: volume_level
    id: ha_volume
    internal: true
    on_value:
      then:
        - lambda: |-
            static int last_vol = -1;
            static uint32_t last_update = 0;
            uint32_t now = millis();
            int current_vol = (int)(x * 100.0f);

            if (abs(current_vol - last_vol) >= 2 || (now - last_update) > 2000) {
              lv_arc_set_value(id(volume_arc), current_vol);
              last_vol = current_vol;
              last_update = now;
            }

binary_sensor:
  - platform: gpio
    pin: GPIO0
    id: encoder_button
    on_press:
      then:
        - lambda: id(is_muted) = !id(is_muted);
        - if:
            condition:
              lambda: 'return id(is_muted);'
            then:
              - homeassistant.service:
                  service: media_player.volume_mute
                  data:
                    entity_id: media_player.schlafzimmer
                    is_volume_muted: "true"
            else:
              - homeassistant.service:
                  service: media_player.volume_mute
                  data:
                    entity_id: media_player.schlafzimmer
                    is_volume_muted: "false"

text_sensor:
  - platform: homeassistant
    entity_id: media_player.schlafzimmer
    attribute: media_title
    id: lms_title
    on_value:
      then:
        - lambda: |-
            static std::string last_title = "";
            std::string new_title = x.c_str();

            if (new_title != last_title) {
              lv_label_set_text(id(label_title), new_title.c_str());
              last_title = new_title;
              id(cover_retry_count) = 0;
              id(download_cover).execute();
            }

  - platform: homeassistant
    entity_id: media_player.schlafzimmer
    attribute: media_artist
    id: lms_artist
    on_value:
      then:
        - lambda: |-
            static std::string last_artist = "";
            std::string new_artist = x.c_str();

            if (new_artist != last_artist) {
              lv_label_set_text(id(label_artist), new_artist.c_str());
              last_artist = new_artist;
            }

